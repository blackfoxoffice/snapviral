<!--
  Supabase auth → "Invite User" template.
  Subject: You're invited to SnapViral
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>You're invited to SnapViral</title>
  </head>
  <body style="margin:0;padding:0;background:#FAFAF7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Helvetica,Arial,sans-serif;color:#0A0A0B;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
      <tr>
        <td align="center" style="padding:32px 16px;">
          <table role="presentation" width="560" cellpadding="0" cellspacing="0" border="0" style="background:#FFFFFF;border-radius:14px;border:1px solid rgba(10,10,11,0.08);max-width:560px;">
            <tr>
              <td style="padding:32px 36px 0 36px;">
                <table cellpadding="0" cellspacing="0" border="0">
                  <tr>
                    <td style="padding-right:8px;font-size:0;line-height:0;">
                      <div style="width:24px;height:24px;border-radius:6px;background:#E11D2C;display:inline-block;"></div>
                    </td>
                    <td style="font-size:18px;font-weight:800;letter-spacing:-0.4px;color:#0A0A0B;">
                      Snap<span style="color:#E11D2C;font-style:italic;font-weight:600;">Viral</span>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:28px 36px 20px 36px;">
                <h1 style="margin:0 0 12px 0;font-size:24px;line-height:30px;font-weight:700;letter-spacing:-0.6px;color:#0A0A0B;">
                  You're invited to SnapViral
                </h1>
                <p style="margin:0 0 22px 0;font-size:15px;line-height:24px;color:#383B40;">
                  Someone added <strong>{{ .Email }}</strong> as a teammate on SnapViral. Accept to set your password and start creating.
                </p>
                <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                  <tr>
                    <td align="center" bgcolor="#0A0A0B" style="border-radius:10px;">
                      <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:13px 22px;font-size:14px;font-weight:600;color:#FFFFFF;text-decoration:none;letter-spacing:-0.2px;">
                        Accept invite →
                      </a>
                    </td>
                  </tr>
                </table>
                <p style="margin:22px 0 0 0;font-size:12px;line-height:20px;color:#71717A;">
                  Or paste:<br />
                  <a href="{{ .ConfirmationURL }}" style="color:#E11D2C;word-break:break-all;">{{ .ConfirmationURL }}</a>
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:0 36px;"><div style="height:1px;background:rgba(10,10,11,0.06);"></div></td>
            </tr>
            <tr>
              <td style="padding:20px 36px 32px 36px;">
                <p style="margin:0;font-size:11px;color:#A1A1AA;">
                  © SnapViral · Didn't expect this invite? Ignore the email and the invite expires in 24 hours.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
